<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Test Panel</title>
    <style>
        /* Базовые настройки страницы */
        body {
            background-color: #0a0a0c;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Контейнер панели */
        .panel {
            background: rgba(16, 16, 20, 0.8);
            border: 2px solid #00ff66;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2), inset 0 0 10px rgba(0, 255, 102, 0.1);
            position: relative;
        }

        /* Главный текст с эффектом свечения */
        h1 {
            font-size: 64px;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00ff66, 0 0 20px #00ff66;
            /* Подключаем анимацию плавного мерцания */
            animation: glow 2s infinite alternate;
        }

        /* Сетчатый фон поверх панели для стиля */
        .panel::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Подзаголовок, который жестко мигает (как курсор) */
        .status {
            font-size: 18px;
            color: #ff0055;
            text-shadow: 0 0 8px #ff0055;
            animation: blink 0.6s infinite steps(2);
        }

        /* АНИМАЦИЯ 1: Плавное изменение яркости свечения */
        @keyframes glow {
            0% {
                opacity: 0.8;
                text-shadow: 0 0 5px #00ff66, 0 0 10px #00ff66;
            }
            100% {
                opacity: 1;
                text-shadow: 0 0 20px #00ff66, 0 0 30px #00ff66, 0 0 40px #00ff66;
            }
        }

        /* АНИМАЦИЯ 2: Резкое мигание (вкл/выкл) */
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="panel">
        <h1>Сосал?</h1>
        <div class="status">> ОЛТИ ЛОХ И СОСАЛ </div>
    </div>

</body>
</html>
